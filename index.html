<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PHARMONY OHI™ Master v2.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- 1. CONFIGURACIÓN DE SEDE Y TÓPICOS -->
        <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <h2 class="font-bold text-lg mb-4">1. Configuración de Sede y Tópicos</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" placeholder="Nombre de Sede Operativa" class="p-2 border rounded">
                <input type="number" placeholder="N° de Tópicos a implementar" class="p-2 border rounded">
            </div>
            <p class="text-xs text-slate-500 mt-2 italic">*Implementación técnica realizada en el espacio provisto por el contratante.</p>
        </div>

        <!-- 2. PANEL DE CONTROL FINANCIERO (BLOQUEADO/PRIVADO) -->
        <div id="financial-panel" class="bg-white p-6 rounded-lg border-2 border-red-200 shadow-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-red-800 flex items-center gap-2">
                    <span class="text-xl">🔒</span> Panel de Control Financiero Interno (Solo Jefatura)
                </h2>
                <button class="bg-red-100 text-red-600 px-4 py-1 rounded text-sm font-bold">Bloquear Panel</button>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-red-50 p-4 rounded border border-red-100">
                    <p class="text-xs font-bold text-red-700">COSTO REAL DE OPERACIÓN</p>
                    <p class="text-2xl font-black text-red-900">S/. 11,100.00</p>
                </div>
                <div class="bg-emerald-50 p-4 rounded border border-emerald-100">
                    <p class="text-xs font-bold text-emerald-700">UTILIDAD NETA ESTIMADA (50%)</p>
                    <p class="text-2xl font-black text-emerald-900">S/. 5,725.00</p>
                </div>
                <div class="bg-blue-50 p-4 rounded border border-blue-100">
                    <p class="text-xs font-bold text-blue-700">COMISIÓN VENDEDOR</p>
                    <p class="text-2xl font-black text-blue-900">S/. 504.75</p>
                </div>
            </div>
        </div>

        <!-- 3. PROPUESTA ECONÓMICA CONSOLIDADA -->
        <!-- (Aquí se renderiza tu tabla OHI con servicios en verde) -->
        
    </div>
</body>
</html>
